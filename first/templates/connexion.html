{% extends "base.html" %}

{% load static %}

{% block content %}
<div class="bg-white shadow-md shadow-gray-900 fixed z-50 top-0 left-0 w-full transition-colors duration-300">
    <nav class="flex justify-between items-center h-16 ml-12 mr-12">
        <div>
            <h3 class="sm:text-xl md:text-2xl lg:text-3xl font-bold">Build<span class="text-blue-500">Hub</span></h3>
        </div>
        <div class="flex list-none gap-x-10">
            <li>
                <a class="hover:text-blue-500 text-gray-600 nav-link sm:text-sm md:text-md lg:text-lg"
                    href="{% url 'home' %}">Accueil</a>
            </li>

            <li>
                <a class="bg-blue-400 text-white rounded-lg p-2 hover:bg-blue-600 font-bold sm:text-sm md:text-md lg:text-lg"
                    href="{% url 'inscription' %}">Inscription</a>
            </li>
        </div>
    </nav>
</div>

<!-- formulaire de connexion  -->
    

<section class="px-4 p-20 bg-blue-100 w-full h-screen" data-aos="fade-right" data-aos-duration="800">

    <!-- ma div blanche en font du formulaire -->

    <div class=" bg-white max-w-2xl p-12 mx-auto rounded-lg h-full shadow-lg ">
        <div class="">
            <!-- main texte  -->
            <div class=" mb-4">
                <h1 class="text-xl sm:text-xl md:text-2xl lg:text-3xl font-bold text-center mb-2">De retour sur
                    Build<span class="text-blue-500">Hub!!!</span></h1>
                <p class="text-sm sm:text-md md:text-xl lg:text-xl text-gray-600 text-center">Connectez-vous à votre
                    compte</p>
            </div>
           
            <!-- champ de saisis -->
            <form action="{% url 'connexion' %}" method="POST" class="space-y-2">
                {% csrf_token %}
                <div data-aos="fade-up" data-aos-duration="100">
                    <label for="" id="" class="block sm:text-sm md:text-md lg:text-lg text-gray-800">Email</label>
                    <input type="email" id="" name="email" placeholder="exemple@gmail.com" required
                        class="mt-1 block w-full rounded-lg p-2 focus:outline-none focus:ring-2 focus:border-blue-500 focus:ring-blue-500 border-gray-500 shadow-md">
                </div>

                <div>
                    <label for="" class="blocksm:text-sm md:text-md lg:text-lg text-gray-800">Mot de passe</label>
                    <input type="password" name="password" placeholder="***********" required
                        class="mt-1 block w-full rounded-lg p-2 focus:outline-none focus:ring-2 focus:border-blue-500 focus:ring-blue-500 border-gray-500 shadow-md">
                </div>

                <!-- bouton de connexion -->
                <div class="text-center mt-3">
                    <button type="submit"
                        class="text-md font-bold w-full inline-flex justify-center py-3 px-6 border border-transparent shadow-sm rounded-md text-white bg-blue-500 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">Connexion</button>
                </div>

                <!-- mot de passe oublié -->
                <a class="bg-red-100 m-1 p-1 rounded-lg" href="{% url 'mdpoublie' %}"><span class="text-sm hover:text-red-500">Mot de passe oublié ?</span>
                </a>

                <!-- retour sur la page d'inscription -->
                <div class="text-center mt-5">
                    <p class="text-sm sm:text-sm md:text-md lg:text-lg text-gray-600 text-center">Pas de compte?
                        <a href="{% url 'inscription' %}">
                            <span class="text-blue-500  font-bold">créer votre compte
                            </span>
                        </a>
                    </p>
                </div>

            </form>

        </div>

    </div>
</section>

<script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>

<script>
    AOS.init({
        duration: 1000,
        once: true,
        offset: 120,
        easing: 'ease-in-out'
    });
</script>


{% endblock %}
